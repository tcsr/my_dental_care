<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Implants</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #pre-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0f1e;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #pre-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Animated background glow */
      #pre-splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 60% at 20% 30%, rgba(14,165,233,0.12) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 80% 70%, rgba(99,102,241,0.10) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 50% 110%, rgba(16,185,129,0.06) 0%, transparent 60%);
        animation: bgPulse 4s ease-in-out infinite alternate;
      }
      @keyframes bgPulse { from { opacity: 0.7; } to { opacity: 1; } }

      /* Subtle grid */
      .s-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(14,165,233,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14,165,233,0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
        pointer-events: none;
      }

      /* Expanding rings */
      .s-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(14,165,233,0.14);
        animation: ringExpand 3s ease-out infinite;
      }
      .s-ring:nth-child(2) { width: 150px; height: 150px; animation-delay: 0s; }
      .s-ring:nth-child(3) { width: 220px; height: 220px; animation-delay: 0.9s; }
      .s-ring:nth-child(4) { width: 300px; height: 300px; animation-delay: 1.8s; }
      @keyframes ringExpand {
        0%   { transform: scale(0.8); opacity: 0.6; }
        100% { transform: scale(1.2); opacity: 0; }
      }

      /* Logo */
      .s-logo {
        position: relative;
        z-index: 1;
        width: 82px;
        height: 82px;
        border-radius: 26px;
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.1),
          0 24px 56px rgba(14,165,233,0.45),
          0 0 100px rgba(99,102,241,0.2);
        animation: logoFloat 3.2s ease-in-out infinite, fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        margin-bottom: 26px;
      }
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-9px); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Brand text */
      .s-brand {
        position: relative;
        z-index: 1;
        font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 1.65rem;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #ffffff;
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both;
        margin-bottom: 5px;
      }
      .s-brand em {
        font-style: normal;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .s-tag {
        position: relative;
        z-index: 1;
        font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s both;
        margin-bottom: 42px;
      }

      /* Shimmer progress bar */
      .s-bar-track {
        position: relative;
        z-index: 1;
        width: 168px;
        height: 3px;
        border-radius: 99px;
        background: rgba(255,255,255,0.07);
        overflow: hidden;
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both;
      }
      .s-bar {
        position: absolute;
        inset: 0;
        border-radius: 99px;
        background: linear-gradient(90deg, transparent, #0ea5e9, #6366f1, #0ea5e9, transparent);
        background-size: 300% 100%;
        animation: barShimmer 1.6s linear infinite;
      }
      @keyframes barShimmer {
        0%   { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }

      /* Bouncing dots */
      .s-dots {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 7px;
        margin-top: 20px;
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.5s both;
      }
      .s-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(56, 189, 248, 0.55);
        animation: dotBounce 1.3s ease-in-out infinite;
      }
      .s-dot:nth-child(2) { animation-delay: 0.22s; }
      .s-dot:nth-child(3) { animation-delay: 0.44s; }
      @keyframes dotBounce {
        0%, 75%, 100% { transform: translateY(0); opacity: 0.4; }
        38%           { transform: translateY(-8px); opacity: 1; }
      }
    </style>
  </head>
  <body>

    <div id="pre-splash">
      <div class="s-grid"></div>
      <div class="s-ring"></div>
      <div class="s-ring"></div>
      <div class="s-ring"></div>

      <div class="s-logo">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="rgba(255,255,255,0.2)"/>
          <path d="M8 11.5c.5-1 1.5-2 3-2s2.5 1 3 2c.5 1.5.5 3.5 0 4.5s-2 1.5-3 1.5-2.5-.5-3-1.5c-.5-1-.5-3 0-4.5z" fill="none"/>
        </svg>
      </div>

      <div class="s-brand"><em>Simple</em> Implants</div>
      <div class="s-tag">Dental Commerce Platform</div>

      <div class="s-bar-track">
        <div class="s-bar"></div>
      </div>

      <div class="s-dots">
        <div class="s-dot"></div>
        <div class="s-dot"></div>
        <div class="s-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Fade out the pre-splash once React has mounted
      (function () {
        var splash = document.getElementById('pre-splash');
        if (!splash) return;
        var root = document.getElementById('root');
        var observer = new MutationObserver(function () {
          if (root && root.children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 700);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: true });
        // Fallback: force-hide after 8 seconds
        setTimeout(function () { splash.classList.add('hidden'); }, 8000);
      })();
    </script>
  </body>
</html>
