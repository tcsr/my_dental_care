<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Simple Implants</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #pre-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.65s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.65s ease;
        overflow: hidden;
      }
      #pre-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Animated background glows for light theme */
      .s-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(99, 102, 241, 0.03) 50%, transparent 70%);
        filter: blur(80px);
        animation: glowMove 8s ease-in-out infinite alternate;
        pointer-events: none;
      }
      .s-glow-2 {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, rgba(14, 165, 233, 0.02) 50%, transparent 70%);
        filter: blur(60px);
        animation: glowMove2 6s ease-in-out infinite alternate-reverse;
        pointer-events: none;
      }
      @keyframes glowMove {
        0% { transform: translate(-10%, -10%) scale(1); }
        100% { transform: translate(10%, 10%) scale(1.1); }
      }
      @keyframes glowMove2 {
        0% { transform: translate(15%, -15%) scale(0.9); }
        100% { transform: translate(-15%, 15%) scale(1.05); }
      }

      /* Subtle grid background with slow drifting motion */
      .s-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
        pointer-events: none;
        animation: gridMove 24s linear infinite;
      }
      @keyframes gridMove {
        from { background-position: 0 0; }
        to { background-position: 56px 56px; }
      }

      /* Logo Card Container */
      .s-logo-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
      }

      /* Rotating / Floating outer rings with opacity pulse */
      .s-orbital {
        position: absolute;
        border-radius: 50%;
        border: 1px dashed rgba(14, 165, 233, 0.25);
        animation: rotateOrbital 12s linear infinite;
        pointer-events: none;
      }
      .s-orbital-1 { width: 210px; height: 210px; }
      .s-orbital-2 { width: 280px; height: 280px; animation-duration: 18s; animation-direction: reverse; }

      @keyframes rotateOrbital {
        0% { transform: rotate(0deg); opacity: 0.2; }
        50% { transform: rotate(180deg); opacity: 0.5; }
        100% { transform: rotate(360deg); opacity: 0.2; }
      }

      /* Floating Glowing Glassmorphic Logo Circle with Light Shine Reflection */
      .s-logo {
        position: relative;
        width: 148px;
        height: 148px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        border: 1.5px solid rgba(14, 165, 233, 0.22);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 16px 40px rgba(148, 163, 184, 0.16),
          0 4px 12px rgba(14, 165, 233, 0.08),
          inset 0 1px 1px rgba(255, 255, 255, 1);
        animation: logoFloat 4s ease-in-out infinite;
        transform-style: preserve-3d;
      }
      .s-logo::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 35%, rgba(255, 255, 255, 0.4) 45%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0.4) 55%, transparent 65%);
        background-size: 200% 100%;
        background-position: 200% 0;
        animation: logoShine 3s ease-in-out infinite;
        border-radius: 50%;
        pointer-events: none;
      }
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
        50% { transform: translateY(-10px) rotate(2deg) scale(1.03); }
      }
      @keyframes logoShine {
        0% { background-position: 150% 0; }
        100% { background-position: -150% 0; }
      }

      /* Brand Typography */
      .s-brand {
        position: relative;
        z-index: 1;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-align: center;
        margin-bottom: 6px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }
      .s-brand em {
        font-style: normal;
        background: linear-gradient(135deg, #38bdf8 30%, #818cf8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .s-tag {
        position: relative;
        z-index: 1;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        text-align: center;
        margin-bottom: 40px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
      }

      /* Premium Progress Indicator */
      .s-loader-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 220px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }

      .s-bar-track {
        position: relative;
        width: 100%;
        height: 4px;
        border-radius: 99px;
        background: rgba(148, 163, 184, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.15);
        overflow: hidden;
        box-shadow: 0 0 10px rgba(14, 165, 233, 0.1), inset 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .s-bar {
        position: absolute;
        inset: 0;
        border-radius: 99px;
        background: linear-gradient(90deg, #38bdf8, #818cf8, #34d399, #38bdf8);
        background-size: 200% 100%;
        animation: barProgress 2.2s linear infinite;
      }
      @keyframes barProgress {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

    </style>
  </head>
  <body>

    <div id="pre-splash">
      <div class="s-glow"></div>
      <div class="s-glow-2"></div>
      <div class="s-grid"></div>

      <div class="s-logo-container">
        <div class="s-orbital s-orbital-1"></div>
        <div class="s-orbital s-orbital-2"></div>
        <div class="s-logo">
          <img src="/logo.png" alt="Simple Implants Logo" style="width: 96px; height: 96px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(14, 165, 233, 0.25));" />
        </div>
      </div>

      <div class="s-loader-container">
        <div class="s-bar-track">
          <div class="s-bar"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Fade out the pre-splash once React has mounted
      (function () {
        var splash = document.getElementById('pre-splash');
        if (!splash) return;
        var root = document.getElementById('root');
        var observer = new MutationObserver(function () {
          if (root && root.children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 700);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: true });
        // Fallback: force-hide after 8 seconds
        setTimeout(function () { splash.classList.add('hidden'); }, 8000);
      })();
    </script>
  </body>
</html>
